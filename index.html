<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader - Sosial Media</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-download"></i> Video Downloader</h1>
            <p>Download video dari Instagram, TikTok, Facebook, Twitter & YouTube</p>
        </header>

        <div class="input-section">
            <div class="platform-selector">
                <select id="platform">
                    <option value="">Pilih Platform</option>
                    <option value="instagram">Instagram</option>
                    <option value="tiktok">TikTok</option>
                    <option value="facebook">Facebook</option>
                    <option value="twitter">Twitter/X</option>
                    <option value="youtube">YouTube</option>
                </select>
            </div>
            <div class="url-input">
                <input type="url" id="videoUrl" placeholder="Paste URL video di sini..." required>
                <button id="downloadBtn">
                    <i class="fas fa-download"></i> Download
                </button>
            </div>
        </div>

        <div class="loading" id="loading" style="display: none;">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Mengambil informasi video...</p>
        </div>

        <div class="result" id="result" style="display: none;"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
